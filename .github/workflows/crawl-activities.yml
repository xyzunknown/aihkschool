name: Crawl Activities

on:
  schedule:
    # Every Monday 03:00 HKT = 19:00 UTC Sunday
    # LCSD updates on the 15th → run on the 16th of each month at 03:00 HKT
    - cron: "0 19 15 * *"
  workflow_dispatch: # manual trigger

jobs:
  crawl-lcsd:
    name: LCSD Open Data Sync
    runs-on: ubuntu-latest
    timeout-minutes: 10 # Fast — no browser, no AI, just fetch + upsert

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm install --no-save @supabase/supabase-js

      - name: Fetch LCSD JSON + upsert to Supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/crawlers/lcsd.mjs

      - name: Summary
        if: always()
        run: echo "LCSD sync complete. Check logs above for insert count."
