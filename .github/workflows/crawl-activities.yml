name: Crawl Activities

on:
  schedule:
    # Every Monday 03:00 HKT = Sunday 19:00 UTC
    - cron: "0 19 * * 0"
  workflow_dispatch: # manual trigger

jobs:
  crawl-timable:
    name: Timable GraphQL Sync
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm install --no-save @supabase/supabase-js

      - name: Run migration 013 (add timable source)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "$DATABASE_URL" ]; then
            psql "$DATABASE_URL" -f supabase/migrations/013_add_timable_source.sql || echo "Migration already applied or skipped"
          else
            echo "DATABASE_URL not set — skipping migration"
          fi

      - name: Fetch Timable kids events + upsert to Supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/crawlers/timable.mjs

      - name: Summary
        if: always()
        run: echo "Timable sync complete. Check logs above for insert count."
